# Режим изоляции «новый чат = новый контейнер» (RUNNER_ISOLATION=1):
#  - данные лежат в bind-каталоге хоста (OPENCODE_DATA_DIR), а не в named volume,
#    чтобы раннеры могли монтировать ОТДЕЛЬНЫЕ подкаталоги сессий;
#  - прокси управляет раннерами через /var/run/docker.sock (в раннеры сокет НЕ монтируется);
#  - миграция со старого volume: см. RUNNER_ISOLATION.md.
services:
  opencode-ui:
    build: .
    container_name: opencode-ui
    ports:
      - "3000:3000"
    volumes:
      - ${OPENCODE_DATA_DIR:-/srv/opencode-data}:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      # OpenCode's Google AI SDK reads GOOGLE_GENERATIVE_AI_API_KEY. Keep the
      # shorter GEMINI_API_KEY as the deployment-facing alias.
      - GOOGLE_GENERATIVE_AI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Cloudflare Gemini Proxy (решает проблему региона)
      - GEMINI_PROXY_URL=${GEMINI_PROXY_URL:-https://browserai-proxy.robesthud.workers.dev}
      - PORT=3000
      - NODE_ENV=production
      - OPENCODE_WORKDIR=/app/workspace
      # Override with a managed Redis URL in .env for multi-host deployments.
      - RATE_LIMIT_REDIS_URL=${RATE_LIMIT_REDIS_URL:-redis://redis:6379}
      # --- изоляция через контейнеры-раннеры ---
      - RUNNER_ISOLATION=${RUNNER_ISOLATION:-1}
      - HOST_WORKSPACE_DIR=${OPENCODE_DATA_DIR:-/srv/opencode-data}
      - RUNNER_IMAGE=${RUNNER_IMAGE:-opencode-runner:latest}
      - RUNNER_NETWORK=${RUNNER_NETWORK:-opencode-runners}
      - RUNNER_MEMORY=${RUNNER_MEMORY:-1536m}
      - RUNNER_CPUS=${RUNNER_CPUS:-1}
      - RUNNER_PIDS_LIMIT=${RUNNER_PIDS_LIMIT:-512}
      - RUNNER_USER=${RUNNER_USER:-1000:1000}
      - RUNNER_IDLE_STOP_MIN=${RUNNER_IDLE_STOP_MIN:-30}
      - RUNNER_PUBLISH_PORTS=${RUNNER_PUBLISH_PORTS:-3001}
      - RUNNER_PUBLISH_HOST=${RUNNER_PUBLISH_HOST:-127.0.0.1}
      - TZ=UTC
    networks:
      default:
      runners:
        # Статический IP прокси в сети раннеров: на него завязано разрешающее
        # правило DOCKER-USER при icc=false (см. RUNNER_ISOLATION.md).
        ipv4_address: 172.28.0.10
    depends_on:
      redis:
        condition: service_healthy
    # Релиз 3: много одновременных SSE-соединений — дефолтного лимита
    # файловых дескрипторов не хватает ("too many open files").
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: always

  # Сборка образа раннера: docker compose --profile build-runner build runner-image
  runner-image:
    build:
      context: .
      dockerfile: Dockerfile.runner
    image: opencode-runner:latest
    command: ["echo", "runner image built"]
    profiles: ["build-runner"]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

networks:
  runners:
    name: opencode-runners
    driver: bridge
    driver_opts:
      # Межконтейнерная связь выключена: раннер не может сканировать сеть
      # и ходить в чужие сессии (SSRF). Трафик прокси↔раннер разрешается
      # точечным правилом DOCKER-USER на хосте (см. RUNNER_ISOLATION.md).
      com.docker.network.bridge.enable_icc: "false"
    ipam:
      config:
        - subnet: 172.28.0.0/24
