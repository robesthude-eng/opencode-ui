services:
  opencode-ui:
    build: .
    container_name: opencode-ui
    ports:
      - "3000:3000"
    volumes:
      - opencode_data:/app/workspace
    env_file:
      - .env
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - PORT=3000
      - NODE_ENV=production
      - OPENCODE_WORKDIR=/app/workspace
      # Override with a managed Redis URL in .env for multi-host deployments.
      - RATE_LIMIT_REDIS_URL=${RATE_LIMIT_REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

volumes:
  opencode_data:
