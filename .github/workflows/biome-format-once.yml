name: Biome one-time format

# Ручной разовый джоб: приводит существующий код к стандарту Biome одним
# коммитом в отдельную ветку + PR, чтобы можно было ревьюнуть форматирование
# перед мерджем. Запускается только вручную (workflow_dispatch), никогда на
# push/PR — обязательную проверку без авто-фиксов делает job `test-and-build`
# в ci.yml (`npm run lint`).
#
# Использование: Actions → "Biome one-time format" → Run workflow.
# После того как получившийся PR смержен и код проходит `npm run lint` без
# авто-фиксов, этот workflow можно удалить — он предназначен для одноразового
# наведения порядка, а не для постоянной авто-правки истории.
on:
  workflow_dispatch: {}

# Точечное расширение прав только для этого ручного джоба: основной CI
# (push/PR) остаётся на contents: read.
permissions:
  contents: write
  pull-requests: write

jobs:
  biome-format:
    name: Apply Biome formatting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Apply Biome formatting and safe fixes
        run: npm run check

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open formatting PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="chore/biome-one-time-format-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -A
          git commit -m "chore: one-time Biome formatting pass"
          git push origin "$branch"
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$branch" \
            --title "chore: one-time Biome formatting pass" \
            --body "Auto-generated by the *Biome one-time format* workflow. Applies \`npm run check\` (Biome format + safe lint fixes) across the repo so the enforced \`npm run lint\` step in CI passes without further manual formatting. Review the diff before merging."

      - name: No changes needed
        if: steps.diff.outputs.changed == 'false'
        run: echo "Repository already matches Biome formatting — nothing to do."
