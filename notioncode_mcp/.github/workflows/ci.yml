name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            runtime/package-lock.json
            notion-private-api-mcp/package-lock.json
      - run: python -m venv .runtime/notion-agent-cli-venv
      - run: .runtime/notion-agent-cli-venv/bin/pip install -r requirements.txt
      - run: npm --prefix runtime ci
      - run: npm --prefix notion-private-api-mcp ci
      - run: PYTHONPATH=bridge .runtime/notion-agent-cli-venv/bin/python -m unittest discover -s bridge/tests -v
      - run: npm --prefix runtime test
      - run: npm --prefix runtime run check
      - run: npm --prefix notion-private-api-mcp run check
      - run: node --test scripts/install-codex-config.test.mjs
      - run: node --test scripts/render-config.test.mjs
      - run: node scripts/check-layout.mjs
      - run: node scripts/check-public-release.mjs
      - run: bash -n scripts/install-local.sh bridge/start.sh runtime/start.sh

  windows-syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$tokens, [ref]$parseErrors
            )
            $errors += $parseErrors
          }
          if ($errors.Count) { $errors | Format-List; exit 1 }
      - run: node scripts/check-layout.mjs
